version: '3.9'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nexus_db
    environment:
      SA_PASSWORD: "NexusDB@2025!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - nexus_db_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'NexusDB@2025!' -Q 'SELECT 1'"]
      interval: 15s
      timeout: 10s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Nexus.Web/Dockerfile
    container_name: nexus_web
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=NexusLearningDB;User Id=sa;Password=NexusDB@2025!;TrustServerCertificate=True;"
      RunMigrationsOnStartup: "true"
      OpenAI__ApiKey: "${OPENAI_API_KEY:-}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  nexus_db_data:
